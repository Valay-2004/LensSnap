<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>LensSnap</title>
    <link rel="stylesheet" href="sidepanel.css" />
    <script src="cropper.min.js"></script>
</head>

<body>
    <div class="container">
        <header>
            <h1>LensSnap</h1>
            <button id="recapture">Recapture</button>
        </header>

        <div id="preview-wrapper" class="preview-wrapper">
            <img id="preview" alt="Captured image" />
        </div>

        <div id="crop-controls" class="controls">
            <button id="confirm-crop">Confirm Crop</button>
        </div>

        <div id="search-panel" class="search-panel hidden">
            <h3>Search with copied image</h3>
            <div class="engines">
                <button data-engine="google">Google Lens</button>
                <button data-engine="yandex">Yandex</button>
                <button data-engine="bing">Bing Visual</button>
                <button data-engine="tineye">TinEye</button>
            </div>
            <p class="hint">
                Image copied to clipboard ✓<br />Paste on the opened page if needed.
            </p>
        </div>
    </div>

    <script src="sidepanel.js"></script>
</body>

</html>
