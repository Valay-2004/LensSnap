<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LensSnap</title>
    <link rel="stylesheet" href="sidepanel.css" />
    <link rel="stylesheet" href="cropper.min.css">
    <script src="cropper.min.js"></script>
</head>

<body>
    <div class="container">
        <header>
            <h1>LensSnap</h1>
            <button id="recapture" aria-label="Recapture">Recapture</button>
        </header>

        <div id="preview-wrapper" class="preview-wrapper">
            <img id="preview" alt="Captured image" />
        </div>

        <div id="crop-controls" class="controls">
            <button id="confirm-crop" class="primary-btn">Confirm Crop</button>
        </div>

        <div id="search-panel" class="search-panel hidden">
            <h3>Search with copied image</h3>
            <div class="engines">
                <button data-engine="google" class="engine-btn">Google Lens</button>
                <button data-engine="yandex" class="engine-btn">Yandex</button>
                <button data-engine="bing" class="engine-btn">Bing Visual</button>
                <button data-engine="tineye" class="engine-btn">TinEye</button>
            </div>

            <!-- Future LLM Integration Placeholder -->
            <!-- <div id="ai-analysis" class="ai-panel">
                <h4>Ask AI about this image</h4>
                <div class="ai-placeholder">
                    <span>(Coming Soon)</span>
                    <p>Send this screenshot to an LLM for structured analysis and visual Q&A.</p>
                </div>
            </div> -->
            <p class="hint">
                Image copied to clipboard ✓<br />Paste on the opened page if needed.
            </p>
        </div>
    </div>

    <script src="sidepanel.js"></script>
</body>

</html>
